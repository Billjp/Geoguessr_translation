<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoGuessr Enhancer</title>
  <style>
    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #252836;
      --border: #2e3244; --accent: #4f8ef7; --accent-glow: rgba(79, 142, 247, 0.25);
      --green: #3ecf8e; --green-glow: rgba(62, 207, 142, 0.2);
      --text: #e8eaf6; --text-dim: #6b7280; --danger: #ef4444;
      --font: 'Segoe UI', 'Helvetica Neue', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); width: 340px; overflow-x: hidden; }

    /* ヘッダー・トグル等のスタイルは維持 */
    .header { background: linear-gradient(135deg, #1a1d27 0%, #131620 100%); border-bottom: 1px solid var(--border); padding: 14px 16px 12px; display: flex; align-items: center; gap: 10px; }
    .header-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent), #7c3aed); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .header-title { font-size: 14px; font-weight: 700; color: var(--text); }
    .header-sub { font-size: 10px; color: var(--text-dim); margin-top: 1px; }
    
    .section { padding: 14px 16px; border-bottom: 1px solid var(--border); }
    .section:last-child { border-bottom: none; }
    .section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .section-icon { font-size: 16px; width: 24px; text-align: center; }
    .section-title { font-size: 12px; font-weight: 700; text-transform: uppercase; color: var(--text-dim); }

    .toggle-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .toggle-label { font-size: 13px; color: var(--text); display: flex; align-items: center; gap: 6px; }
    
    .toggle { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; inset: 0; background: var(--surface2); border: 1px solid var(--border); border-radius: 22px; cursor: pointer; transition: all 0.25s; }
    .toggle-slider::before { content: ''; position: absolute; width: 16px; height: 16px; left: 2px; top: 2px; background: var(--text-dim); border-radius: 50%; transition: all 0.25s; }
    .toggle input:checked + .toggle-slider { background: var(--green); border-color: var(--green); box-shadow: 0 0 8px var(--green-glow); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(18px); background: #fff; }

    .file-input-wrap { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
    .file-btn { padding: 5px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 11px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .file-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
    .file-name { font-size: 10px; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 160px; }
    .file-name.set { color: var(--green); }
    .reset-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 12px; padding: 2px; }
    .reset-btn:hover { color: var(--danger); }

    .translate-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; justify-content: space-between; }
    .translate-row label { font-size: 11px; color: var(--text-dim); min-width: 50px; }
    select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 4px 8px; font-size: 11px; cursor: pointer; appearance: none; padding-right: 22px; width: 100%; max-width: 220px; }
    select:focus { outline: none; border-color: var(--accent); }

    /* API設定領域のスタイル */
    #apiSettingsWrap {
      margin-top: 10px; padding: 10px; background: rgba(0,0,0,0.15); 
      border: 1px solid var(--border); border-radius: 6px; display: none;
    }
    .engine-settings { display: none; }
    .engine-settings.active { display: block; }
    .api-input {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      color: var(--text); border-radius: 4px; padding: 6px 8px; font-size: 11px;
      margin-top: 4px; box-sizing: border-box; font-family: monospace;
    }
    .api-input:focus { outline: none; border-color: var(--accent); }

    .status-bar { padding: 8px 16px; background: var(--surface); border-top: 1px solid var(--border); display: flex; align-items: center; gap: 6px; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .status-text { font-size: 10px; color: var(--text-dim); }

    .section-content.disabled { opacity: 0.4; pointer-events: none; }
    input[type="file"] { display: none; }
    .tip { font-size: 10px; color: var(--text-dim); margin-top: 4px; line-height: 1.4; }
    
    .save-toast { position: fixed; bottom: 12px; right: 12px; background: var(--green); color: #000; padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; opacity: 0; transform: translateY(6px); transition: all 0.25s; pointer-events: none; }
    .save-toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

<div class="header">
  <div class="header-icon">🌍</div>
  <div>
    <div class="header-title">GeoGuessr Enhancer</div>
    <div class="header-sub">音声・方位磁針・AIチャット翻訳</div>
  </div>
  <div class="header-badge">v2.0</div>
</div>

<!-- 音声セクション -->
<div class="section">
  <div class="section-header"><div class="section-icon">🔊</div><div class="section-title">効果音の置き換え</div></div>
  <div class="toggle-row">
    <label class="toggle-label"><span class="emoji">🎵</span>チーン音を置き換え</label>
    <label class="toggle"><input type="checkbox" id="soundEnabled" /><span class="toggle-slider"></span></label>
  </div>
  <div id="soundContent" class="section-content">
    <div class="file-input-wrap">
      <button class="file-btn" id="soundPickBtn">🎧 音声を選択</button>
      <span class="file-name" id="soundFileName">デフォルト音声を使用</span>
      <button class="reset-btn" id="soundReset" title="デフォルトに戻す">✕</button>
    </div>
    <input type="file" id="soundFile" accept=".mp3,.ogg,.wav,.webm,.aac" />
  </div>
</div>

<!-- 方位磁針セクション -->
<div class="section">
  <div class="section-header"><div class="section-icon">🧭</div><div class="section-title">方位磁針の置き換え</div></div>
  <div class="toggle-row">
    <label class="toggle-label"><span class="emoji">🖼️</span>画像を置き換え</label>
    <label class="toggle"><input type="checkbox" id="compassEnabled" /><span class="toggle-slider"></span></label>
  </div>
  <div id="compassContent" class="section-content">
    <div class="file-input-wrap">
      <button class="file-btn" id="compassPickBtn">🖼️ 画像を選択</button>
      <span class="file-name" id="compassFileName">デフォルト画像を使用</span>
      <button class="reset-btn" id="compassReset" title="デフォルトに戻す">✕</button>
    </div>
    <input type="file" id="compassFile" accept=".png,.jpg,.jpeg,.svg,.webp,.gif" />
  </div>
</div>

<!-- チャット翻訳セクション -->
<div class="section">
  <div class="section-header"><div class="section-icon">💬</div><div class="section-title">チャットAI翻訳</div></div>
  <div class="toggle-row">
    <label class="toggle-label"><span class="emoji">🌐</span>翻訳を有効化</label>
    <label class="toggle"><input type="checkbox" id="translateEnabled" /><span class="toggle-slider"></span></label>
  </div>
  <div id="translateContent" class="section-content">
    <div class="translate-row">
      <label>エンジン</label>
      <select id="translateEngine">
        <option value="mymemory">MyMemory (無料/キー不要)</option>
        <option value="gemini">Gemini API (高精度)</option>
        <option value="openai">OpenAI API (GPT)</option>
        <option value="lmstudio">LM Studio (Local LLM)</option>
      </select>
    </div>

    <!-- API設定領域 (選択に応じて表示) -->
    <div id="apiSettingsWrap">
      <div id="geminiSettings" class="engine-settings">
        <label style="font-size: 10px; color: var(--text-dim);">Gemini API Key</label>
        <input type="password" id="geminiApiKey" class="api-input" placeholder="AIzaSy...">
      </div>
      <div id="openaiSettings" class="engine-settings">
        <label style="font-size: 10px; color: var(--text-dim);">OpenAI API Key</label>
        <input type="password" id="openaiApiKey" class="api-input" placeholder="sk-...">
      </div>
      <div id="lmstudioSettings" class="engine-settings">
        <label style="font-size: 10px; color: var(--text-dim);">LM Studio Base URL</label>
        <input type="text" id="lmStudioUrl" class="api-input" placeholder="http://localhost:1234">
      </div>
    </div>

    <div class="translate-row">
      <label>翻訳元</label>
      <select id="translateSource">
        <option value="auto">自動検出</option>
        <option value="en">英語</option><option value="ja">日本語</option>
        <option value="zh">中国語</option><option value="ko">韓国語</option>
        <option value="fr">フランス語</option><option value="de">ドイツ語</option>
        <option value="es">スペイン語</option><option value="ru">ロシア語</option>
      </select>
    </div>
    <div class="translate-row">
      <label>翻訳先</label>
      <select id="translateTarget">
        <option value="ja">日本語</option><option value="en">英語</option>
        <option value="zh">中国語</option><option value="ko">韓国語</option>
        <option value="fr">フランス語</option><option value="de">ドイツ語</option>
        <option value="es">スペイン語</option>
      </select>
    </div>
  </div>
</div>

<div class="status-bar">
  <div class="status-dot"></div>
  <div class="status-text" id="statusText">geoguessr.com で有効</div>
</div>

<div class="save-toast" id="saveToast">✓ 保存しました</div>

<script src="popup.js"></script>
</body>
</html>
